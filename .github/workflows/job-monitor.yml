name: Job Monitor Daily

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SUPERJOB_APP_ID: ${{ secrets.SUPERJOB_APP_ID }}
          HH_USER_AGENT: ${{ secrets.HH_USER_AGENT }}
          HH_ACCESS_TOKEN: ${{ secrets.HH_ACCESS_TOKEN }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          if [ -n "$(git status --porcelain data/jobs.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/jobs.json
            git commit -m "chore: update job monitor state"
            git push
          else
            echo "No state changes to commit."
          fi
